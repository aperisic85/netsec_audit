!
! Example Cisco IOS config with intentional security issues
! for demonstrating netsec-audit.
!
version 15.2
hostname R1
!
enable password cisco123
!
ip http server
!
snmp-server community public RO
snmp-server community private RW
!
line con 0
 exec-timeout 0 0
line vty 0 4
 password letmein
 transport input telnet ssh
!
interface GigabitEthernet0/0
 ip address 192.168.1.1 255.255.255.0
 no shutdown
!
no aaa new-model
username admin privilege 15 password 0 admin123
!
ip ftp username ftpuser
ip ftp password ftppass
!
snmp-server host 192.0.2.10 trapcomm
!
ntp server 192.0.2.20
!
end
